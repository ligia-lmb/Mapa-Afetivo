<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nossas primeiras vezes</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #fdf6f3;
    color: #4a2e2e;
  }
  header {
    text-align: center;
    padding: 24px 16px 12px;
    background: linear-gradient(180deg, #fdf0ec 0%, #fdf6f3 100%);
  }
  header h1 {
    margin: 0 0 6px;
    font-size: 26px;
    font-weight: 600;
    color: #b5495b;
    letter-spacing: 0.5px;
  }
  header p {
    margin: 0;
    font-size: 14px;
    color: #8a6a6a;
  }
  #map {
    height: 70vh;
    width: 100%;
    min-height: 420px;
  }
  .leaflet-popup-content-wrapper {
    border-radius: 14px;
  }
  .popup-card {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    max-width: 230px;
  }
  .popup-card h3 {
    margin: 0 0 4px;
    font-size: 15px;
    color: #b5495b;
  }
  .popup-card p {
    margin: 0;
    font-size: 13px;
    line-height: 1.5;
    color: #5a4040;
  }
  .popup-card .tag {
    display: inline-block;
    margin-top: 6px;
    font-size: 11px;
    background: #fbe1e6;
    color: #b5495b;
    padding: 2px 8px;
    border-radius: 999px;
  }
  footer {
    text-align: center;
    padding: 18px 16px 28px;
    font-size: 13px;
    color: #a98484;
  }
  .heart-icon {
    font-size: 18px;
  }
</style>
</head>
<body>

<header>
  <h1>♥ Nossas primeiras vezes ♥</h1>
  <p>Um mapa com pedacinhos da nossa história — clique nos coraçõezinhos</p>
</header>

<div id="map"></div>

<footer>feito com carinho, para você 💌</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  var map = L.map('map').setView([-15.0, -45.0], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  // Ícone de coração customizado
  var heartIcon = L.divIcon({
    html: '<div style="font-size:26px; line-height:1; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));">❤️</div>',
    className: '',
    iconSize: [26, 26],
    iconAnchor: [13, 13],
    popupAnchor: [0, -14]
  });

  var memorias = [
    {
      titulo: "Onde nos conhecemos",
      lat: -22.8974, lng: -43.1990,
      texto: "Em meio ao caos ongueiro, nossos caminhos se cruzaram pela primeira vez — sem que fizéssemos ideia do que estava por vir depois da minha saída.",
      tag: "O começo"
    },
    {
      titulo: "Primeiro flerte",
      lat: -22.9504, lng: -43.1825,
      texto: "Deixei o IMF e fui viver o meu sabático. Logo nas minhas primeiras semanas de liberdade, combinamos de trocar artes, mas acabamos trocando também algo mais. No Chora Bar eu tive certeza de que queria mais do que ser sua amiga kkkkk",
      tag: "Primeiro flerte"
    },
    {
      titulo: "Primeiro beijo",
      lat: -22.9171, lng: -43.2316,
      texto: "No Mangabar, naquele fatídico aniversário, nossa maluquice começou oficialmente. Entre esfregadas em pedaços de bolo, manchas de graxa e algumas cervejas derramadas, a pegação virou a madrugada e a minha vontade era que nunca mais parássemos aquele beijo delícia que parecia ter parado o mundo todo ao nosso redor.",
      tag: "Primeiro beijo"
    },
    {
      titulo: "Primeiro mergulho na chuva",
      lat: -12.9750, lng: -38.5300,
      texto: "A viagem mais aleatória e improvável acabou virando um dos nossos momentos mais marcantes pra mim. Porto da Barra, chuva forte caindo lá fora e a gente decidiu entrar no mar mesmo assim. Foi ali que aprendi que com você as melhores aventuras são as menos planejadas. De quebra ainda disse pela primeira vez que te amava (tanto que dava tontura, fraqueza, taquicardia kkkkkkkk)",
      tag: "Primeira aventura"
    },
    {
      titulo: "Nossa primeira trilha — e foi no Cerrado!",
      lat: -14.0833, lng: -47.5667,
      texto: "Conhecer a Chapada dos Veadeiros, debaixo daquele céu enorme e da força das cachoeiras mais bonitas que eu vi na vida foi magia purinha.",
      tag: "Primeira trilha"
    },
    {
      titulo: "Primeira viagem das artistasssss!",
      lat: -23.5874, lng: -46.6576,
      texto: "Prometi voltar à Bienal de São Paulo de 2025 e terminar a visita juntinho com você. Promessa cumprida com prazer (literalmente).",
      tag: "Primeira viagem cultural"
    },
    {
      titulo: "Primeiro ano novo juntas",
      lat: -22.2364, lng: -42.5306,
      texto: "Em Lumiar, mais uma vez sem muito planejamento, vivi uma virada de ano delícia e especial do seu lado. Até Balaio a gata arriou! Ali eu percebi que conviver com você é fácil e potencialmente viciante.",
      tag: "Primeira virada"
    },
    {
      titulo: "Primeira vez em uma ilha",
      lat: -23.0167, lng: -44.1167,
      texto: "Jaguanum foi nossa primeira ilha — só mar, beck, feijoada, doguinhas, praia e a gente, sem pressa de voltar pro caos.",
      tag: "Primeira ilha"
    }
  ];

  var bounds = [];

  memorias.forEach(function(m) {
    var marker = L.marker([m.lat, m.lng], { icon: heartIcon }).addTo(map);
    marker.bindPopup(
      '<div class="popup-card">' +
        '<h3>' + m.titulo + '</h3>' +
        '<p>' + m.texto + '</p>' +
        '<span class="tag">' + m.tag + '</span>' +
      '</div>'
    );
    bounds.push([m.lat, m.lng]);
  });

  map.fitBounds(bounds, { padding: [40, 40] });
</script>

</body>
</html>
